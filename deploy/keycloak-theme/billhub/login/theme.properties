# Keycloak login-тема BillHub (клиент billhub, realm su10).
#
# Дизайн 07/08 (hero СУ_10 «Портал для согласования поставок» + карточка формы справа,
# переключатель light/dark в правом верхнем углу). Реализация — CSS + JS поверх базовой
# темы keycloak.v2 (KC 26), без переопределения FreeMarker-шаблонов: hero-колонка и
# тумблер темы инжектятся скриптом (theme.js), брендинг — стилями (styles.css). Так тема
# устойчива к смене версии KC и не может «сломать» вход.
#
# ВАЖНО: точную посадку и совместимость селекторов проверить на ТЕСТОВОМ realm до su10
# (см. rollout в docs/keycloak-billhub.md). При необходимости — донастроить styles.css.

parent=keycloak.v2
import=common/keycloak

# Наши ресурсы добавляются ПОСЛЕ базовых стилей keycloak.v2.
styles=css/styles.css
scripts=js/theme.js
