# Дефолтный сервер общего ingress (C8 bootstrap). Обслуживает ACME-challenge для ВСЕХ доменов
# (выпуск/продление сертификатов при работающем nginx) и закрывает соединения с неизвестным Host.
# На этом конфиге infra-nginx стартует ПЕРВЫМ (только :80 + ACME), ДО выпуска сертификатов —
# поэтому 443-блоков с путями к ещё не существующим сертификатам здесь нет.
server {
    listen 80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 444;
    }
}
