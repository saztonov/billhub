# Host-level ingress: общий nginx reverse proxy + certbot на ВСЕ порталы VPS (§1, по образцу EstiMat).
# Разворачивается ОДИН раз на хост в /opt/infra/nginx, обновляется независимо от порталов:
#   docker compose -p infra-nginx up -d
#
# Каждый портал кладёт свой server-блок в ./conf.d/<portal>.conf и делает reload:
#   docker exec infra-nginx nginx -t && docker exec infra-nginx nginx -s reload
# Сеть edge — общая со всеми порталами (docker network create edge).

services:
  nginx:
    image: nginx:alpine
    container_name: infra-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks: [edge]

  certbot:
    image: certbot/certbot
    container_name: infra-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Автопродление сертификатов всех порталов (webroot). Перечитывание nginx — по cron (см. README).
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

networks:
  edge:
    external: true
