# nginx образа billhub-web: раздача ТОЛЬКО статики SPA (C1).
# Проксирование /api/* выполняет infra-nginx (ingress), сюда /api не доходит.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Сжатие ответов
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Хеш-ассеты иммутабельны (имя меняется при изменении содержимого)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html — всегда свежий (не кэшировать)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # version.json — свежий buildId, без кэша (механизм «доступна новая версия»)
    location = /version.json {
        add_header Cache-Control "no-store" always;
    }

    # SPA-роутинг: все неизвестные пути отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Заголовки безопасности
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
