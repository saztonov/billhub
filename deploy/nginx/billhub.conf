# Вклад портала BillHub в общий ingress (§1). Копируется в /opt/infra/nginx/conf.d/billhub.conf,
# затем `nginx -t && nginx -s reload`. Замените billhub.example на реальный домен.
#
# C6 SAME-ORIGIN: один домен, path-routing (/ → billhub-web, /api → billhub-api). Это сохраняет
# cookie-auth (SameSite=Lax без Domain, credentials:include) — split app.*/api.* его сломал бы.
# C7: перенесены спец-директивы BillHub (upload без буферизации, download streaming, SSE, 110m).
# C8: 443-блок добавляется ТОЛЬКО после выпуска сертификата webroot'ом (иначе nginx -t упадёт).

# --- HTTP: ACME challenge + редирект на HTTPS ---
server {
    listen 80;
    server_name billhub.example;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: единый домен (SPA + API на одном origin) ---
server {
    listen 443 ssl;
    http2 on;
    server_name billhub.example;

    ssl_certificate     /etc/letsencrypt/live/billhub.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/billhub.example/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;

    # Общий потолок тела запроса (C7) — выше лимита загрузок.
    client_max_body_size 110m;

    # Загрузка чанков файлов (до 6 МБ на чанк, без буферизации запроса) → API.
    location /api/files/upload/ {
        proxy_pass http://billhub-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 6m;
        proxy_request_buffering off;
    }

    # Скачивание файлов (стриминг без буферизации ответа) → API.
    location /api/files/download/ {
        proxy_pass http://billhub-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # Остальные API-запросы → API. SSE/upload-progress: буферизация и кэш off.
    location /api/ {
        proxy_pass http://billhub-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        proxy_cache off;
    }

    # SPA-статика → web-контейнер портала.
    location / {
        proxy_pass http://billhub-web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
    }
}
