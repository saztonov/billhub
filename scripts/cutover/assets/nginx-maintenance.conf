# =============================================================================
# nginx-maintenance.conf — read-only режим старого прода в cutover-окне (Iteration 10).
#
# Назначение: ЕДИНСТВЕННОЕ изменение старого прода за всё время Этапа 1 (жёсткий принцип 1) —
# перевод в read-only БЕЗ деплоя нового кода бэкенда. Маршрутизация на уровне nginx:
#   - GET / HEAD / OPTIONS на /api/  → проходят на backend (чтение работает, RPO 0 не страдает);
#   - POST / PUT / PATCH / DELETE    → 503 + JSON {"error":"maintenance"} (запись запрещена);
#   - SPA отдаётся как обычно (пользователь видит данные read-only).
#
# Установка (делает scripts/cutover/02-maintenance-on-old.sh): этот файл подменяет активный
# конфиг сайта во фронтенд-nginx старого прода (напр. /etc/nginx/conf.d/default.conf внутри
# контейнера nginx), затем `nginx -t && nginx -s reload`. Снятие (rollback Сценарий A) —
# возврат оригинального конфига (бэкап делает 02-й скрипт) + reload.
#
# Маркер X-BillHub-Maintenance: read-only — для идемпотентной детекции состояния (02-й скрипт
# и smoke проверяют его наличие через `curl -I`). НЕ удалять строку add_header ниже.
# =============================================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Маркер режима для идемпотентной детекции и аудита (см. 02-maintenance-on-old.sh).
    add_header X-BillHub-Maintenance "read-only" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Скачивание файлов — GET, чтение разрешено (стриминг без буферизации, как в основном конфиге).
    location /api/files/download/ {
        limit_except GET HEAD OPTIONS { deny all; }
        error_page 403 = @maintenance_write;
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # Загрузка чанков — POST: запрещено в read-only (вернётся 503 через limit_except).
    location /api/files/upload/ {
        limit_except GET HEAD OPTIONS { deny all; }
        error_page 403 = @maintenance_write;
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Общий /api/: read-методы проходят, write-методы → 503 maintenance.
    location /api/ {
        limit_except GET HEAD OPTIONS { deny all; }
        error_page 403 = @maintenance_write;
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        proxy_cache off;
    }

    # Единая точка ответа на запрещённую запись: 503 + Retry-After (окно cutover, RTO 2–4 ч).
    location @maintenance_write {
        default_type application/json;
        add_header X-BillHub-Maintenance "read-only" always;
        add_header Retry-After 14400 always;
        return 503 '{"error":"maintenance","message":"Идёт плановое обслуживание. Портал доступен только для чтения, запись временно недоступна."}';
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
